<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Libro de Reclamaciones | DavidCorp S.R.L.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="assets/libro-de-reclamaciones.png">
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      background: #ffffff;
      color: #003344;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    header img {
      height: 50px;
    }
    header h1 {
      font-size: 1.5rem;
    }
    form {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #f4f4f4;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      font-weight: bold;
    }
    input, textarea, select {
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 100%;
    }
    button {
      background-color: #004d73;
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #003951;
    }
    .confirmacion {
      margin-top: 1rem;
      padding: 1rem;
      background-color: #d1f0dc;
      border-left: 4px solid #2eb85c;
      display: none;
      text-align: center;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <header>
    <a href="www.davidcorp.p-e.kr"> <!-- REEMPLAZA ESTE LINK POR EL DE TU HOME -->
      <img src="https://lh3.googleusercontent.com/pw/AP1GczPuJpGPK5sEiQW1scBJH_LxzELaR2E3ACKJMUTGR1AuB6b8ys0HzaYuDZk4GhBL4z1ut6b3kxVyObJips5pNsedvPsEQxjmcbws_S7xOxeRwxoq6OqonHC2LZsv4jBtE1TJmyBUiTi9k5ocfazOtQ=w438-h246-s-no-gm?authuser=0" alt="Logo"> <!-- REEMPLAZA ESTE LINK POR TU LOGO -->
    </a>
    <h1>Libro de Reclamaciones Virtual</h1>
  </header>

  <form id="libroReclamos">
    <label for="nombre">Nombre completo:</label>
    <input type="text" id="nombre" name="nombre" required>

    <label for="dni">DNI:</label>
    <input type="text" id="dni" name="dni" required>

    <label for="direccion">Dirección:</label>
    <input type="text" id="direccion" name="direccion" required>

    <label for="telefono">Teléfono:</label>
    <input type="text" id="telefono" name="telefono">

    <label for="correo">Correo electrónico:</label>
    <input type="email" id="correo" name="correo" required>

    <label for="producto">Servicio relacionado:</label>
    <input type="text" id="producto" name="producto" required>

    <label for="tipo">Tipo:</label>
    <select id="tipo" name="tipo" required>
      <option value="reclamo">Reclamo</option>
      <option value="queja">Queja</option>
    </select>

    <label for="detalle">Detalle del reclamo o queja:</label>
    <textarea id="detalle" name="detalle" rows="4" required></textarea>

    <label for="pedido">Pedido del consumidor:</label>
    <textarea id="pedido" name="pedido" rows="3" required></textarea>

    <input type="hidden" name="_subject" value="Nuevo Reclamo desde el Libro Virtual">
    <input type="hidden" name="_template" value="box">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_autoresponse" value="Gracias por registrar tu reclamo. DavidCorp S.R.L. te responderá en un plazo no mayor a 15 días hábiles.">

    <button type="submit">Enviar Reclamo</button>

    <div class="confirmacion" id="mensajeExito">
      ✅ Reclamo registrado correctamente. Guarda este código: <strong id="codigoRegistro"></strong>
    </div>
  </form>

  <script>
    document.getElementById('libroReclamos').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = this;
      const codigo = 'R-' + new Date().toISOString().slice(0,10).replace(/-/g, '') + '-' + Math.random().toString(36).substr(2, 4).toUpperCase();
      document.getElementById('codigoRegistro').innerText = codigo;
      document.getElementById('mensajeExito').style.display = 'block';

      const formData = new FormData(form);
      formData.append('Código de Reclamo', codigo);

      fetch('https://formsubmit.co/ajax/info@davidcorp.p-e.kr', {
        method: 'POST',
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      })
      .then(response => {
        if (response.ok) {
          form.reset();
        } else {
          alert("Error al enviar el formulario. Intenta nuevamente.");
        }
      })
      .catch(error => {
        console.error(error);
        alert("Error en el sistema. Intenta nuevamente más tarde.");
      });
    });
  </script>
</body>
</html>
